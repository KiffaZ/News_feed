<!DOCTYPE html>

<html lang="ru" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Свежие Новости</title>

<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>
.news-card{
transition:.3s;
}
.news-card:hover{
transform:translateY(-6px);
box-shadow:0 25px 50px -12px rgb(0 0 0 / .2);
}
</style>

</head>

<body class="bg-zinc-50 dark:bg-neutral-950 text-neutral-900 dark:text-neutral-100 min-h-screen">

<!-- HEADER -->

<header class="sticky top-0 bg-white/80 dark:bg-neutral-900/80 backdrop-blur-lg border-b border-neutral-200 dark:border-neutral-800 z-50">
<div class="max-w-7xl mx-auto px-6 py-5 flex justify-between">

<div class="flex items-center gap-3">
<div class="w-9 h-9 bg-gradient-to-br from-violet-500 to-indigo-600 rounded-2xl flex items-center justify-center">
<i class="fa-solid fa-rss text-white text-xl"></i>
</div>
<h1 class="text-3xl font-semibold tracking-tighter">Свежие</h1>
</div>

<div class="flex gap-4">
<button onclick="refreshNews()" class="px-6 py-3 bg-neutral-900 text-white dark:bg-white dark:text-black rounded-3xl">
<i class="fa-solid fa-rotate"></i>
</button>

<button onclick="toggleTheme()" class="w-11 h-11 rounded-3xl hover:bg-neutral-200 dark:hover:bg-neutral-800">
<i id="theme-icon" class="fa-solid fa-moon text-xl"></i>
</button>
</div>

</div>
</header>

<div class="max-w-7xl mx-auto px-6 py-10 grid grid-cols-1 lg:grid-cols-12 gap-12">

<!-- FEED -->

<div class="lg:col-span-8">

<div id="loading" class="text-center py-24">
<i class="fa-solid fa-spinner fa-spin text-5xl text-violet-500"></i>
<p class="mt-6 text-neutral-500">Загружаем новости...</p>
</div>

<div id="news-container" class="space-y-10"></div>

<div id="error-message" class="hidden text-center text-red-500"></div>

</div>

<!-- SIDEBAR -->

<div class="lg:col-span-4 space-y-10">

<div class="bg-white dark:bg-neutral-900 rounded-3xl p-8 border border-neutral-200 dark:border-neutral-800">
<h3 class="text-sm uppercase tracking-widest text-neutral-400 mb-6">
<i class="fa-solid fa-list"></i> Источники
</h3>
<div id="sources-list" class="space-y-3 text-sm"></div>
</div>

</div>
</div>

<footer class="text-center text-xs text-neutral-400 py-10">
RSS агрегатор • автообновление 10 минут
</footer>

<script>

/* ================= THEME ================= */

function toggleTheme(){
document.documentElement.classList.toggle("dark");
localStorage.theme=document.documentElement.classList.contains("dark");
}

if(localStorage.theme==="false")
document.documentElement.classList.remove("dark");

/* ================= SOURCES ================= */

const SOURCES=[
{name:"BBC",url:"https://feeds.bbci.co.uk/news/rss.xml"},
{name:"DW",url:"https://rss.dw.com/xml/rss-ru-all"},
{name:"Lenta",url:"https://lenta.ru/rss"},
{name:"Газета",url:"https://www.gazeta.ru/export/rss/lenta.xml"},
{name:"NYTimes Tech",url:"https://rss.nytimes.com/services/xml/rss/nyt/Technology.xml"}
];

const proxies=[
u=>`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(u)}`,
u=>`https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`
];

/* ================= UI ================= */

function renderSources(){
const list=document.getElementById("sources-list");
SOURCES.forEach(s=>{
const el=document.createElement("div");
el.textContent=s.name;
list.appendChild(el);
});
}

function extractImage(item){

if(item.thumbnail) return item.thumbnail;

if(item.enclosure?.link) return item.enclosure.link;

const m=item.description?.match(/<img.*?src="(.*?)"/);

return m?m[1]:"https://picsum.photos/600/400";
}

/* ================= FETCH ================= */

async function fetchFeed(src){

for(const proxy of proxies){
try{
const res=await fetch(proxy(src.url));
const data=await res.json();
if(data.items)
return data.items.map(n=>({...n,source:src.name}));
}catch(e){}
}

return [];
}

/* ================= RENDER ================= */

function renderNews(items){

const container=document.getElementById("news-container");
container.innerHTML="";

items
.sort((a,b)=>new Date(b.pubDate)-new Date(a.pubDate))
.slice(0,50)
.forEach(n=>{

const card=document.createElement("article");

card.className=
"news-card bg-white dark:bg-neutral-900 rounded-3xl overflow-hidden border border-neutral-200 dark:border-neutral-800";

card.innerHTML=`
<a href="${n.link}" target="_blank">
<img loading="lazy"
class="w-full h-64 object-cover"
src="${extractImage(n)}">

<div class="p-6 space-y-3">
<p class="text-xs uppercase text-neutral-400">${n.source}</p>
<h2 class="text-xl font-semibold leading-tight">${n.title}</h2>
<p class="text-sm text-neutral-500">
${new Date(n.pubDate).toLocaleString()}
</p>
</div>
</a>
`;

container.appendChild(card);

});

document.getElementById("loading").style.display="none";
}

/* ================= LOAD ================= */

async function loadNews(){

const results=await Promise.all(
SOURCES.map(fetchFeed)
);

renderNews(results.flat());
}

function refreshNews(){
document.getElementById("loading").style.display="block";
loadNews();
}

/* ================= INIT ================= */

renderSources();
loadNews();
setInterval(loadNews,600000);

</script>

</body>
</html>
