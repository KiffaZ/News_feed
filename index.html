<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Свежие Новости — RSS лента</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  
  <style>
    .news-card { transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
    .news-card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
    
    .ad-placeholder { 
      background: linear-gradient(90deg, #f3e8ff 0%, #e0f2fe 100%); 
      border: 2px dashed #a855f7; 
    }
    .dark .ad-placeholder { 
      background: linear-gradient(90deg, #4c1d95 0%, #1e3a8a 100%); 
      border-color: #c026d3; 
    }
  </style>
</head>
<body class="bg-gray-50 dark:bg-zinc-950 text-gray-900 dark:text-gray-100 min-h-screen">
  <header class="sticky top-0 bg-white dark:bg-zinc-900 border-b border-gray-200 dark:border-zinc-800 z-50">
    <div class="max-w-7xl mx-auto px-4 py-5 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <i class="fa-solid fa-rss text-3xl text-purple-600"></i>
        <h1 class="text-2xl font-bold tracking-tight">Свежие Новости</h1>
      </div>
      
      <div class="flex items-center gap-4">
        <button onclick="refreshNews()" class="flex items-center gap-2 px-6 py-2.5 bg-purple-600 hover:bg-purple-700 text-white rounded-2xl font-medium transition">
          <i class="fa-solid fa-rotate"></i>
          <span>Обновить</span>
        </button>
        
        <button onclick="toggleTheme()" class="w-11 h-11 flex items-center justify-center rounded-2xl hover:bg-gray-100 dark:hover:bg-zinc-800 transition">
          <i id="theme-icon" class="fa-solid fa-moon text-2xl"></i>
        </button>
      </div>
    </div>
  </header>

  <div class="max-w-7xl mx-auto px-4 py-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
    <!-- Лента новостей -->
    <div class="lg:col-span-8">
      <div id="loading" class="text-center py-20">
        <i class="fa-solid fa-spinner fa-spin text-5xl text-purple-600"></i>
        <p class="mt-6 text-xl">Загружаем свежие новости из топ-агентств...</p>
      </div>
      <div id="news-container" class="space-y-8"></div>
      <div id="error-message" class="hidden text-center py-12 text-red-500"></div>
    </div>

    <!-- Сайдбар -->
    <div class="lg:col-span-4 space-y-8">
      <div class="ad-placeholder rounded-3xl p-8 text-center h-96 flex flex-col items-center justify-center">
        <p class="text-purple-600 dark:text-purple-400 text-sm font-medium">Место для вертикального блока Яндекс.РСЯ</p>
      </div>

      <div class="bg-white dark:bg-zinc-900 rounded-3xl p-6 border border-gray-200 dark:border-zinc-800">
        <h3 class="font-semibold mb-4 flex items-center gap-2"><i class="fa-solid fa-list"></i> Источники</h3>
        <div id="sources-list" class="text-sm space-y-2 text-gray-600 dark:text-gray-400"></div>
      </div>

      <div class="ad-placeholder rounded-3xl p-8 text-center">
        <p class="text-purple-600 dark:text-purple-400 text-sm font-medium">Место для горизонтального блока РСЯ</p>
      </div>
    </div>
  </div>

  <footer class="bg-white dark:bg-zinc-900 border-t border-gray-200 dark:border-zinc-800 py-10 text-center text-sm text-gray-500 dark:text-gray-400">
    Автоматическая RSS-лента • Обновляется каждые 10 минут
  </footer>

  <script>
    const feeds = [
      { name: "Лента.ру", url: "https://lenta.ru/rss/news" },
      { name: "РИА Новости", url: "https://ria.ru/export/rss2/all/index.xml" },
      { name: "РБК", url: "https://rssexport.rbc.ru/rbcnews/news/30/full.rss" },
      { name: "ТАСС", url: "https://tass.ru/rss/v2.xml" },
      { name: "Коммерсантъ", url: "https://www.kommersant.ru/RSS/news.xml" },
      { name: "Газета.Ru", url: "https://www.gazeta.ru/export/rss2/all/index.xml" }
    ];

    function toggleTheme() {
      document.documentElement.classList.toggle("dark");
      const isDark = document.documentElement.classList.contains("dark");
      document.getElementById("theme-icon").className = isDark ? "fa-solid fa-sun text-2xl" : "fa-solid fa-moon text-2xl";
      try { localStorage.setItem("theme", isDark ? "dark" : "light"); } catch(e){}
    }

    async function loadNews() {
      const container = document.getElementById("news-container");
      const loading = document.getElementById("loading");
      const errorMsg = document.getElementById("error-message");
      
      container.innerHTML = "";
      loading.classList.remove("hidden");
      errorMsg.classList.add("hidden");

      let allNews = [];
      const sourcesShown = new Set();

      for (const feed of feeds) {
        try {
          const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(feed.url)}`);
          if (!res.ok) throw new Error();
          const data = await res.json();
          const parser = new DOMParser();
          const doc = parser.parseFromString(data.contents, "text/xml");
          const items = doc.querySelectorAll("item");

          items.forEach(item => {
            const title = item.querySelector("title")?.textContent || "Без заголовка";
            const link = item.querySelector("link")?.textContent || "#";
            let desc = (item.querySelector("description")?.textContent || "").replace(/<[^>]+>/g, "").slice(0, 170);
            if (desc) desc += "...";
            const dateStr = item.querySelector("pubDate")?.textContent || "";
            const date = dateStr ? new Date(dateStr) : new Date();

            allNews.push({
              title, link, description: desc, date, source: feed.name, timestamp: date.getTime()
            });
            sourcesShown.add(feed.name);
          });
        } catch(e) {
          console.warn("Не загрузился:", feed.name);
        }
      }

      allNews.sort((a, b) => b.timestamp - a.timestamp);

      // Убираем дубликаты
      const seen = new Set();
      const uniqueNews = allNews.filter(n => {
        if (seen.has(n.title)) return false;
        seen.add(n.title);
        return true;
      });

      loading.classList.add("hidden");

      if (uniqueNews.length === 0) {
        errorMsg.textContent = "Не удалось загрузить новости. Попробуйте обновить позже.";
        errorMsg.classList.remove("hidden");
        return;
      }

      uniqueNews.slice(0, 40).forEach((news, i) => {
        const card = document.createElement("div");
        card.className = "news-card bg-white dark:bg-zinc-900 rounded-3xl p-7 border border-gray-200 dark:border-zinc-800";
        card.innerHTML = `
          <div class="flex justify-between text-xs mb-4">
            <span class="px-4 py-1 bg-purple-100 dark:bg-purple-900/50 text-purple-700 dark:text-purple-300 rounded-full">${news.source}</span>
            <span class="text-gray-500">${news.date.toLocaleDateString('ru-RU')} ${news.date.toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'})}</span>
          </div>
          <a href="${news.link}" target="_blank" rel="noopener" class="block hover:text-purple-600 dark:hover:text-purple-400">
            <h2 class="text-[1.35rem] leading-tight font-semibold mb-3">${news.title}</h2>
            <p class="text-gray-600 dark:text-gray-400">${news.description}</p>
          </a>
        `;
        container.appendChild(card);

        if ((i + 1) % 5 === 0) {
          const ad = document.createElement("div");
          ad.className = "ad-placeholder rounded-3xl p-8 my-10 text-center";
          ad.innerHTML = `<p class="text-purple-600 dark:text-purple-400 text-sm font-medium">Место под рекламный блок Яндекс.РСЯ</p>`;
          container.appendChild(ad);
        }
      });

      // Заполняем список источников
      document.getElementById("sources-list").innerHTML = Array.from(sourcesShown)
        .map(s => `<div class="flex items-center gap-2"><i class="fa-solid fa-check text-emerald-500"></i> ${s}</div>`).join("");
    }

    function refreshNews() {
      loadNews();
    }

    // Инициализация
    window.onload = () => {
      // Tailwind v4 требует инициализации
      if (typeof tailwind !== "undefined") tailwind.config = {};

      // Тема
      try {
        if (localStorage.getItem("theme") === "light") {
          document.documentElement.classList.remove("dark");
          document.getElementById("theme-icon").className = "fa-solid fa-moon text-2xl";
        } else {
          document.getElementById("theme-icon").className = "fa-solid fa-sun text-2xl";
        }
      } catch(e) {}

      loadNews();

      // Автообновление
      setInterval(loadNews, 10 * 60 * 1000);
    };
  </script>
</body>
</html>
