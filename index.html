<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>News Feed</title>

<style>
body{
font-family: Arial, sans-serif;
background:#0f172a;
color:white;
margin:0;
padding:0;
}

header{
background:#020617;
padding:20px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.controls{
text-align:center;
margin:20px;
}

button{
background:#2563eb;
border:none;
padding:10px 18px;
color:white;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#1d4ed8;
}

#status{
text-align:center;
opacity:.7;
margin-bottom:10px;
}

.container{
max-width:900px;
margin:auto;
padding:10px;
}

.news{
background:#1e293b;
margin:12px 0;
padding:16px;
border-radius:10px;
transition:.2s;
}

.news:hover{
transform:translateY(-3px);
background:#334155;
}

.news a{
color:#60a5fa;
text-decoration:none;
font-size:18px;
font-weight:bold;
}

.news p{
margin:8px 0 0;
opacity:.8;
font-size:14px;
}
</style>

</head>

<body>

<header>📰 Live News Feed</header>

<div class="controls">
<button onclick="loadNews()">Обновить новости</button>
</div>

<div id="status">Загрузка новостей...</div>

<div class="container" id="news"></div>

<script>

const SOURCES = [
"https://lenta.ru/rss",
"https://rss.nytimes.com/services/xml/rss/nyt/HomePage.xml",
"https://feeds.bbci.co.uk/news/rss.xml"
];

const PROXY = "https://api.allorigins.win/raw?url=";

async function fetchRSS(url){
try{
const response = await fetch(PROXY + encodeURIComponent(url));
const text = await response.text();

const parser = new DOMParser();
const xml = parser.parseFromString(text,"text/xml");

return [...xml.querySelectorAll("item")].map(item=>({
title:item.querySelector("title")?.textContent || "",
link:item.querySelector("link")?.textContent || "",
date:item.querySelector("pubDate")?.textContent || ""
}));

}catch(e){
console.error("RSS error:",url,e);
return [];
}
}

async function loadNews(){

const container=document.getElementById("news");
const status=document.getElementById("status");

status.innerText="Обновляем новости...";
container.innerHTML="";

let allNews=[];

for(const src of SOURCES){
const news=await fetchRSS(src);
allNews=allNews.concat(news);
}

allNews.sort((a,b)=>new Date(b.date)-new Date(a.date));

allNews.slice(0,20).forEach(n=>{
const div=document.createElement("div");
div.className="news";

div.innerHTML=`
<a href="${n.link}" target="_blank">${n.title}</a>
<p>${new Date(n.date).toLocaleString()}</p>
`;

container.appendChild(div);
});

status.innerText="Последнее обновление: "+new Date().toLocaleTimeString();
}

loadNews();

setInterval(loadNews,600000);

</script>

</body>
</html>
